name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Install docker-compose v1 to ~/bin if not present
            if ! command -v docker-compose &>/dev/null && [ ! -f "$HOME/bin/docker-compose" ]; then
              mkdir -p "$HOME/bin"
              curl -fsSL "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-Linux-x86_64" \
                -o "$HOME/bin/docker-compose"
              chmod +x "$HOME/bin/docker-compose"
            fi
            export PATH="$HOME/bin:$PATH"

            # Login to GHCR to pull the image
            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Clone repo on first deploy, pull updates after
            if [ ! -d "$HOME/webcyber" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/webcyber"
            else
              git -C "$HOME/webcyber" pull
            fi

            cd "$HOME/webcyber"

            # Pull latest image and restart
            export APP_IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker-compose pull app
            docker-compose up -d --no-build

            docker image prune -f
