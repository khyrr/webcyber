name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Install Docker Engine + Compose v2 plugin if missing
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
            fi

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Clone repo on first deploy, pull updates after
            if [ ! -d "$HOME/webcyber" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/webcyber"
            else
              git -C "$HOME/webcyber" pull
            fi

            cd "$HOME/webcyber"

            export APP_IMAGE="ghcr.io/${{ github.repository }}:latest"
            sudo -E docker compose pull app
            sudo -E docker compose up -d --no-build
            sudo -E docker image prune -f
