{#
  Global confirmation modal — included once in base.html.
  Triggered by any element with data-confirm (and optionally data-confirm-danger).

  Usage on a form:
    <form method="POST" action="…"
          data-confirm="Move this note to Trash?"
          data-confirm-danger="true">
      …
    </form>

  Usage on a button (non-form):
    <button data-confirm="Are you sure?" data-confirm-danger="true">…</button>
#}
{% from 'components/icons.html' import status_warning, status_error %}

<!-- ── Confirm modal ──────────────────────────────────────── -->
<div id="confirm-modal"
     role="dialog"
     aria-modal="true"
     aria-labelledby="confirm-modal-title"
     aria-describedby="confirm-modal-body"
     class="fixed inset-0 z-50 hidden items-center justify-center p-4">

  <!-- Backdrop -->
  <div id="confirm-backdrop"
       class="absolute inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity duration-200 opacity-0"></div>

  <!-- Panel -->
  <div id="confirm-panel"
       class="relative w-full max-w-sm bg-white rounded-2xl shadow-xl border border-gray-200
              transition-all duration-200 scale-95 opacity-0">

    <div class="p-6 text-center">
      <!-- Icon -->
      <div id="confirm-icon-wrap"
           class="flex items-center justify-center w-10 h-10 rounded-full mb-4 mx-auto">
      </div>

      <!-- Title -->
      <h2 id="confirm-modal-title"
          class="text-sm font-semibold text-gray-900 mb-1.5"></h2>

      <!-- Body -->
      <p id="confirm-modal-body"
         class="text-xs text-gray-500 leading-relaxed"></p>
    </div>

    <!-- Footer buttons -->
    <div class="px-6 pb-5 flex items-center justify-center gap-2.5">
      <button id="confirm-cancel"
              type="button"
              class="px-4 py-2 text-xs font-medium text-gray-600 bg-white
                     border border-gray-200 rounded-lg hover:bg-gray-50 transition">
        Cancel
      </button>
      <button id="confirm-ok"
              type="button"
              class="px-4 py-2 text-xs font-semibold text-white rounded-lg transition">
        Confirm
      </button>
    </div>

  </div>
</div>
<!-- /confirm modal -->
