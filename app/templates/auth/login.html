{% extends 'base.html' %}

{% block title %}Login - WebCyber{% endblock %}

{% block content %}
<section class="card">
  <h2>Login</h2>
  <form method="post">
    {{ form.hidden_tag() }}

    <label for="username">Username</label>
    {{ form.username(id='username') }}

    <label for="password">Password</label>
    {{ form.password(id='password') }}

    {{ form.submit() }}
  </form>
  <p>Need an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
</section>
{% endblock %}
