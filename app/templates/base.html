<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>{% block title %}WebCyber Secure Notes{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/tailwind.css') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    {% block extra_head %}{% endblock %}
  </head>
  <body class="h-full bg-gray-50 text-gray-900 antialiased">
    <!-- Navigation progress bar -->
    <div id="nav-progress"></div>
    <!-- Sidebar state: applied synchronously before first paint to prevent flash -->
    <script>
      (function () {
        if (
          window.innerWidth >= 1024 &&
          localStorage.getItem("wc_sidebar") === "collapsed"
        ) {
          document.body.classList.add("sidebar-collapsed", "no-transition");
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              document.body.classList.remove("no-transition");
            });
          });
        }
      })();
    </script>
    {% block body %}{% endblock %}
    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <!-- Global confirmation modal -->
    {% include 'components/confirm_modal.html' %}
    <!-- Command palette (Ctrl/Cmd+K) -->
    {% include 'components/command_palette.html' %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
