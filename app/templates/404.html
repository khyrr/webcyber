{% extends "base.html" %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-4">
    <div class="mb-8">
        <svg class="h-32 w-32 text-indigo-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    <h1 class="text-6xl font-bold text-gray-900 dark:text-white mb-4">404</h1>
    <h2 class="text-3xl font-semibold text-gray-800 dark:text-gray-200 mb-6">Page Not Found</h2>
    <p class="text-lg text-gray-600 dark:text-gray-400 mb-8 max-w-md mx-auto">
        Oops! The page you are looking for doesn't exist, has been moved, or you don't have permission to view it.
    </p>
    <a href="{{ url_for('notes.index') }}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
        <svg class="mr-2 -ml-1 text-white h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Return Home
    </a>
</div>
{% endblock %}
